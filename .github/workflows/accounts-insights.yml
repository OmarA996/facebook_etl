name: Accounts + Insights Sync

on:
  schedule:
    # Every 2 hours from 07:00–21:00 UTC (09:00–23:00 Cairo / EET)
    - cron: "0 7,9,11,13,15,17,19,21 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  run:
    name: accounts-insights --to-bigquery
    runs-on: ubuntu-latest
    timeout-minutes: 90

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ads_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write BigQuery credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.BQ_CREDENTIALS_JSON }}' > credentials/bigquery-service-account.json

      - name: Run pipeline
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_API_VERSION: v25.0
          DB_CONN_STRING: postgresql://postgres:postgres@localhost:5432/ads_db
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
          BQ_LOCATION: ${{ secrets.BQ_LOCATION }}
          BQ_CREDENTIALS_PATH: credentials/bigquery-service-account.json
          ALERT_ENVIRONMENT: github-actions
        run: python main.py accounts-insights --days-back 7 --to-bigquery
