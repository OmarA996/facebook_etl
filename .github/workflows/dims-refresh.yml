name: Dimensions Refresh

on:
  schedule:
    # Daily at 09:00 UTC (11:00 Cairo / EET)
    - cron: "0 9 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  run:
    name: dims-refresh --to-bigquery
    runs-on: ubuntu-latest
    timeout-minutes: 180

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ads_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write BigQuery credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.BQ_CREDENTIALS_JSON }}' > credentials/bigquery-service-account.json

      - name: Run pipeline
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_API_VERSION: v25.0
          DB_CONN_STRING: postgresql://postgres:postgres@localhost:5432/ads_db
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
          BQ_LOCATION: ${{ secrets.BQ_LOCATION }}
          BQ_CREDENTIALS_PATH: credentials/bigquery-service-account.json
          ALERT_ENVIRONMENT: github-actions
        run: python main.py dims-refresh --to-bigquery
